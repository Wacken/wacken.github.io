<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VRChat Image Host</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #1a1a1a;
            color: #e0e0e0;
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }
        h1 {
            color: #00fff0;
            border-bottom: 2px solid #333;
            padding-bottom: 10px;
        }
        .notice {
            background-color: #2a2a15;
            border-left: 4px solid #ffcc00;
            padding: 15px;
            margin-bottom: 30px;
            border-radius: 4px;
        }
        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }
        .card {
            background-color: #262626;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .card img {
            max-width: 100%;
            height: auto;
            border-radius: 4px;
            background-color: #333;
        }
        .card p {
            margin: 10px 0 0 0;
            font-size: 0.9rem;
            word-break: break-all;
            color: #aaa;
        }
    </style>
</head>
<body>

    <h1>VRChat Texture Host</h1>
    
    <div class="notice">
        <strong>VRChat Reminder:</strong> Ensure <em>"Allow Untrusted URLs"</em> is enabled in your in-game VRChat settings, or these textures won't load in your world!
    </div>

    <h2>Uploaded Textures</h2>
    <div class="image-grid">
        
        <!-- IMAGE CARD 1 -->
        <div class="card">
            <!-- Replace "avatar_skin.png" with your actual filename -->
            <img src="avatar_skin.png" alt="Base Texture">
            <p>Filename: <code>avatar_skin.png</code></p>
        </div>

        <!-- IMAGE CARD 2 -->
        <div class="card">
            <!-- Replace "emission_map.png" with your actual filename -->
            <img src="emission_map.png" alt="Emission Texture">
            <p>Filename: <code>emission_map.png</code></p>
        </div>

    </div>

</body>
</html>
